# Build platform-specific wheels for the `cobre` Python package and publish
# to PyPI.  Wheels contain the compiled Rust extension (PyO3/maturin) with
# the HiGHS LP solver statically linked.
#
# Platforms:  linux x86_64, linux aarch64, macOS x86_64, macOS aarch64
# Python:    3.12+ (single abi3 wheel per platform via PyO3 stable ABI)
#
# Note: sdist is not built because maturin cannot package crates with path
# dependencies outside the crate directory (known maturin limitation).
# Users who need to build from source should clone the full workspace.
#
# Uses PyPI trusted publishing (OIDC) — no API tokens needed.
# Configure at: https://pypi.org/manage/project/cobre/settings/publishing/

name: Release Python

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build wheels but do not publish to PyPI"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

jobs:
  # Build wheels for each platform/arch combination.
  build:
    name: wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          working-directory: crates/cobre-python
          before-script-linux: |
            # cmake is required for building HiGHS (vendored LP solver).
            # zlib is required by several dependencies (arrow/parquet).
            if command -v apt-get &>/dev/null; then
              apt-get update && apt-get install -y cmake zlib1g-dev
              # Cross-compilation containers have an aarch64 sysroot but lack
              # the target-arch zlib. Build zlib from source for the cross target.
              if [ -d /usr/aarch64-unknown-linux-gnu ]; then
                curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz -o /tmp/zlib.tar.gz
                tar xzf /tmp/zlib.tar.gz -C /tmp
                cd /tmp/zlib-1.3.1
                CC=aarch64-unknown-linux-gnu-gcc \
                  ./configure --prefix=/usr/aarch64-unknown-linux-gnu
                make -j"$(nproc)" install
                cd /
                rm -rf /tmp/zlib-1.3.1 /tmp/zlib.tar.gz
              fi
            elif command -v dnf &>/dev/null; then
              dnf install -y cmake zlib-devel
            elif command -v yum &>/dev/null; then
              yum install -y cmake3 zlib-devel || yum install -y cmake zlib-devel
            fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/cobre-python/dist/

  # Publish all wheels to PyPI.
  publish:
    name: Publish to PyPI
    needs: [build]
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      && !(github.event.inputs.dry-run == 'true')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
