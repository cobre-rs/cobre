# Build MPI-enabled binaries and attach them to the GitHub Release created by
# the main release.yml (cargo-dist).  Triggered by the same version tags.
#
# Produces one archive per platform:
#   cobre-mpi-<version>-<target>.tar.gz
#
# The archive contains the `cobre-mpi` binary and a README.
#
# aarch64-unknown-linux-gnu uses GitHub's free ARM64 runners (ubuntu-24.04-arm)
# available for public repositories since January 2025.
#
# x86_64-apple-darwin is omitted: the macos-13 Intel runner was deprecated and
# cross-compiling MPI on ARM runners is non-trivial. Intel Mac users can build
# from source with `cargo build --release --features mpi -p cobre-cli`.

name: Release MPI

permissions:
  contents: write

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build-mpi:
    name: mpi (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            mpi_install: sudo apt-get update && sudo apt-get install -y libmpich-dev
          # aarch64-unknown-linux-gnu is disabled until ferrompi 0.2.x fixes
          # the c_char signedness issue on aarch64 (i8 vs u8).
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-24.04-arm
          #   mpi_install: sudo apt-get update && sudo apt-get install -y libmpich-dev
          - target: aarch64-apple-darwin
            runner: macos-14
            mpi_install: brew install mpich
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: mpi-${{ matrix.target }}

      - name: Install MPI
        run: ${{ matrix.mpi_install }}

      - name: Build cobre with MPI
        run: cargo build --release --features mpi -p cobre-cli

      - name: Package archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="cobre-mpi-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p staging
          cp target/release/cobre staging/cobre-mpi

          cat > staging/README.txt << 'EOF'
          cobre-mpi — Cobre SDDP solver with MPI communication backend.

          This binary requires an MPI-4.0-compatible runtime at launch:
            - MPICH 4.0+  (recommended)
            - Intel MPI 2021+  (MPICH ABI compatible)
            - MVAPICH2 3.0+  (MPICH ABI compatible)

          Usage:
            mpiexec -n <nprocs> ./cobre-mpi run <case-dir>

          For the single-process variant (no MPI dependency), download
          the standard 'cobre' binary from the same GitHub release.
          EOF

          tar czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        run: |
          # Wait for the main release workflow (cargo-dist) to create the
          # GitHub Release. With Windows targets the build can take 15+ minutes.
          for i in $(seq 1 30); do
            if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
              echo "Release $GITHUB_REF_NAME found."
              break
            fi
            echo "Waiting for release $GITHUB_REF_NAME... ($i/30)"
            sleep 30
          done
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber
