# Build MPI-enabled binaries and attach them to the GitHub Release created by
# the main release.yml (cargo-dist).  Triggered by the same version tags.
#
# Produces one archive per platform:
#   cobre-mpi-<version>-<target>.tar.gz
#
# The archive contains the `cobre-mpi` binary and a README.
#
# Linux targets build MPICH from source (cached) to link against `libmpi.so`
# (the upstream/universal name). Ubuntu's apt `libmpich-dev` package renames
# the library to `libmpich.so`, which doesn't exist on HPC clusters where
# MPICH is compiled from source, Spack, or module systems.
#
# aarch64-unknown-linux-gnu uses GitHub's free ARM64 runners (ubuntu-24.04-arm)
# available for public repositories since January 2025.
#
# x86_64-apple-darwin is omitted: the macos-13 Intel runner was deprecated and
# cross-compiling MPI on ARM runners is non-trivial. Intel Mac users can build
# from source with `cargo build --release --features mpi -p cobre-cli`.

name: Release MPI

permissions:
  contents: write

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

env:
  MPICH_VERSION: "4.3.2"

jobs:
  build-mpi:
    name: mpi (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            mpi_source: source
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            mpi_source: source
          - target: aarch64-apple-darwin
            runner: macos-14
            mpi_source: brew
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: mpi-${{ matrix.target }}

      # --- MPICH from source (Linux) ---
      # Cached by version+arch. Only headers and libmpi.so are needed at
      # compile time — the user's own MPICH is loaded at runtime.
      - name: Cache MPICH
        if: matrix.mpi_source == 'source'
        id: mpich-cache
        uses: actions/cache@v4
        with:
          path: /opt/mpich
          key: mpich-${{ env.MPICH_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Build MPICH from source
        if: matrix.mpi_source == 'source' && steps.mpich-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q "https://www.mpich.org/static/downloads/${MPICH_VERSION}/mpich-${MPICH_VERSION}.tar.gz"
          tar xzf "mpich-${MPICH_VERSION}.tar.gz"
          cd "mpich-${MPICH_VERSION}"
          ./configure --prefix=/opt/mpich \
              --disable-fortran \
              --disable-cxx \
              --disable-romio \
              --disable-doc \
              --with-device=ch3:nemesis
          make -j"$(nproc)"
          make install

      - name: Set MPICH environment (Linux)
        if: matrix.mpi_source == 'source'
        run: |
          echo "/opt/mpich/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=/opt/mpich/lib/pkgconfig" >> "$GITHUB_ENV"

      # --- MPICH from Homebrew (macOS) ---
      - name: Install MPICH (brew)
        if: matrix.mpi_source == 'brew'
        run: brew install mpich

      - name: Build cobre with MPI
        run: cargo build --release --features mpi -p cobre-cli

      - name: Package archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="cobre-mpi-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p staging
          cp target/release/cobre staging/cobre-mpi

          cat > staging/README.txt << 'EOF'
          cobre-mpi — Cobre SDDP solver with MPI communication backend.

          This binary links against libmpi.so.12 (MPICH 4.x ABI).
          Compatible runtimes:
            - MPICH 4.0+  (recommended)
            - Intel MPI 2021+  (MPICH ABI compatible)
            - MVAPICH2 3.0+  (MPICH ABI compatible)

          Ensure libmpi.so.12 is discoverable at runtime:
            export LD_LIBRARY_PATH=/path/to/mpich/lib:$LD_LIBRARY_PATH
            mpiexec -n <nprocs> ./cobre-mpi run <case-dir>

          Or use your cluster's module system (e.g. `module load mpich`).

          For the single-process variant (no MPI dependency), download
          the standard 'cobre' binary from the same GitHub release.
          EOF

          tar czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        run: |
          # Wait for the main release workflow (cargo-dist) to create the
          # GitHub Release. With Windows targets the build can take 15+ minutes.
          for i in $(seq 1 30); do
            if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
              echo "Release $GITHUB_REF_NAME found."
              break
            fi
            echo "Waiting for release $GITHUB_REF_NAME... ($i/30)"
            sleep 30
          done
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber
