[book]
title = "Cobre"
description = "Open infrastructure for power system computation"
authors = ["Rogério J. M. Alves"]
language = "en"
src = "src"

[build]
build-dir = "output"

[output.html]
default-theme = "coal"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/cobre-rs/cobre"
edit-url-template = "https://github.com/cobre-rs/cobre/edit/main/book/{path}"
site-url = "/"
additional-css = ["theme/css/custom.css"]
no-section-label = false
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
