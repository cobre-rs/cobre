<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', sans-serif;">
  <style>
    text { fill: #c8c6c2; }
    .title { font-size: 14px; font-weight: 500; }
    .sub { font-size: 12px; fill: #8b9298; }
    .arr { stroke: #8b9298; stroke-width: 1; fill: none; }
    marker path { fill: none; stroke: #8b9298; stroke-width: 1.5; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect width="680" height="520" fill="#0f1419" rx="8"/>
  <text class="title" x="340" y="28" text-anchor="middle" fill="#e8e6e3">Data flow: from files to ForwardSampler</text>

  <!-- Files -->
  <text class="sub" x="56" y="56">Parquet files</text>
  <rect x="40" y="64" width="140" height="28" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="110" y="82" text-anchor="middle">inflow_history</text>
  <rect x="195" y="64" width="140" height="28" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="265" y="82" text-anchor="middle">external_inflow</text>
  <rect x="350" y="64" width="140" height="28" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="420" y="82" text-anchor="middle">seasonal_stats</text>
  <rect x="505" y="64" width="140" height="28" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="575" y="82" text-anchor="middle">ar_coefficients</text>

  <!-- cobre-io -->
  <rect x="40" y="120" width="600" height="48" rx="10" fill="#042c53" stroke="#185fa5" stroke-width="0.5"/>
  <text class="title" x="340" y="142" text-anchor="middle" fill="#85b7eb">cobre-io — parse, validate, build System</text>
  <text class="sub" x="340" y="160" text-anchor="middle" fill="#185fa5">Raw rows stored on System alongside other inputs</text>
  <line x1="110" y1="92" x2="200" y2="118" class="arr" marker-end="url(#a)"/>
  <line x1="265" y1="92" x2="290" y2="118" class="arr" marker-end="url(#a)"/>
  <line x1="420" y1="92" x2="390" y2="118" class="arr" marker-end="url(#a)"/>
  <line x1="575" y1="92" x2="490" y2="118" class="arr" marker-end="url(#a)"/>

  <!-- System -->
  <rect x="260" y="190" width="160" height="34" rx="6" fill="#042c53" stroke="#185fa5" stroke-width="0.5"/>
  <text class="title" x="340" y="212" text-anchor="middle" fill="#85b7eb">System</text>
  <line x1="340" y1="168" x2="340" y2="188" class="arr" marker-end="url(#a)"/>

  <!-- Estimation -->
  <rect x="40" y="252" width="280" height="44" rx="8" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="title" x="180" y="270" text-anchor="middle" fill="#5dcaa5">estimation.rs</text>
  <text class="sub" x="180" y="288" text-anchor="middle" fill="#0f6e56">Fit PAR model from history</text>
  <line x1="310" y1="224" x2="240" y2="250" class="arr" marker-end="url(#a)"/>

  <!-- StochasticContext -->
  <rect x="360" y="252" width="280" height="44" rx="8" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="title" x="500" y="270" text-anchor="middle" fill="#afa9ec">build_stochastic_context</text>
  <text class="sub" x="500" y="288" text-anchor="middle" fill="#534ab7">PAR params, tree, correlation</text>
  <line x1="370" y1="224" x2="440" y2="250" class="arr" marker-end="url(#a)"/>

  <!-- setup.rs -->
  <rect x="40" y="328" width="600" height="56" rx="10" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="340" y="350" text-anchor="middle" fill="#f0997b">setup.rs — library construction</text>
  <text class="sub" x="340" y="370" text-anchor="middle" fill="#993c1d">system.inflow_history() + stochastic.par() → libraries</text>
  <line x1="180" y1="296" x2="180" y2="326" class="arr" marker-end="url(#a)"/>
  <line x1="500" y1="296" x2="500" y2="326" class="arr" marker-end="url(#a)"/>

  <!-- Libraries -->
  <rect x="60" y="414" width="240" height="28" rx="6" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="sub" x="180" y="432" text-anchor="middle" fill="#5dcaa5">HistoricalScenarioLibrary</text>
  <rect x="380" y="414" width="240" height="28" rx="6" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="sub" x="500" y="432" text-anchor="middle" fill="#f0997b">ExternalScenarioLibrary</text>
  <line x1="180" y1="384" x2="180" y2="412" class="arr" marker-end="url(#a)"/>
  <line x1="500" y1="384" x2="500" y2="412" class="arr" marker-end="url(#a)"/>

  <!-- ForwardSampler -->
  <rect x="140" y="470" width="400" height="30" rx="8" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="title" x="340" y="490" text-anchor="middle" fill="#afa9ec">ForwardSampler (passed by &amp;ref)</text>
  <line x1="180" y1="442" x2="260" y2="468" class="arr" marker-end="url(#a)"/>
  <line x1="500" y1="442" x2="420" y2="468" class="arr" marker-end="url(#a)"/>
</svg>
