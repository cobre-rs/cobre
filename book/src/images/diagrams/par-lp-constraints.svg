<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', sans-serif;">
  <style>
    text { fill: #c8c6c2; }
    .title { font-size: 14px; font-weight: 500; }
    .sub { font-size: 12px; fill: #8b9298; }
    .arr { stroke: #8b9298; stroke-width: 1; fill: none; }
    marker path { fill: none; stroke: #8b9298; stroke-width: 1.5; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect width="680" height="540" fill="#0f1419" rx="8"/>
  <text class="title" x="340" y="28" text-anchor="middle" fill="#e8e6e3">PAR model in the stage LP</text>

  <!-- Incoming state -->
  <rect x="60" y="50" width="120" height="40" rx="8" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="title" x="120" y="74" text-anchor="middle" fill="#e8e6e3">v_in (hm³)</text>

  <rect x="210" y="50" width="180" height="40" rx="8" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="title" x="300" y="74" text-anchor="middle" fill="#5dcaa5">lag₁…lagₚ (m³/s)</text>

  <rect x="430" y="50" width="100" height="40" rx="8" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="title" x="480" y="74" text-anchor="middle" fill="#afa9ec">η (noise)</text>

  <text class="sub" x="340" y="112" text-anchor="middle">Incoming state from previous stage</text>

  <!-- Fixing -->
  <rect x="60" y="128" width="280" height="44" rx="8" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="title" x="200" y="146" text-anchor="middle" fill="#e8e6e3">Fixing constraints</text>
  <text class="sub" x="200" y="164" text-anchor="middle">v_in = v̄, lag_ℓ = laḡ_ℓ</text>
  <line x1="120" y1="90" x2="120" y2="126" class="arr" marker-end="url(#a)"/>
  <line x1="300" y1="90" x2="300" y2="126" class="arr" marker-end="url(#a)"/>

  <!-- Z-inflow -->
  <rect x="40" y="204" width="600" height="66" rx="10" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="340" y="228" text-anchor="middle" fill="#f0997b">Z-inflow definition (m³/s)</text>
  <text class="sub" x="340" y="252" text-anchor="middle" fill="#993c1d">z_h − Σ ψ_{m,ℓ} · lag_ℓ = b_m + σ_m · η_h</text>
  <line x1="300" y1="172" x2="300" y2="202" class="arr" marker-end="url(#a)"/>
  <line x1="480" y1="90" x2="480" y2="202" class="arr" marker-end="url(#a)"/>

  <!-- z_inflow result -->
  <rect x="260" y="302" width="160" height="40" rx="8" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="340" y="326" text-anchor="middle" fill="#f0997b">z_inflow (m³/s)</text>
  <line x1="340" y1="270" x2="340" y2="300" class="arr" marker-end="url(#a)"/>

  <!-- Water balance -->
  <rect x="40" y="378" width="600" height="66" rx="10" fill="#042c53" stroke="#185fa5" stroke-width="0.5"/>
  <text class="title" x="340" y="402" text-anchor="middle" fill="#85b7eb">Water balance (hm³)</text>
  <text class="sub" x="340" y="426" text-anchor="middle" fill="#185fa5">v_out − v_in + ζ·(outflows) = ζ·(z_inflow − withdrawal)</text>
  <line x1="340" y1="342" x2="340" y2="376" class="arr" marker-end="url(#a)"/>
  <line x1="120" y1="172" x2="120" y2="376" class="arr" marker-end="url(#a)"/>

  <!-- Outgoing state -->
  <rect x="120" y="478" width="130" height="40" rx="8" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="title" x="185" y="502" text-anchor="middle" fill="#e8e6e3">v_out (hm³)</text>

  <rect x="290" y="478" width="180" height="40" rx="8" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="380" y="502" text-anchor="middle" fill="#f0997b">z_inflow → new lag₁</text>
  <line x1="185" y1="444" x2="185" y2="476" class="arr" marker-end="url(#a)"/>
  <line x1="380" y1="444" x2="380" y2="476" class="arr" marker-end="url(#a)"/>

  <text class="sub" x="530" y="498" fill="#8b9298">Outgoing state → next stage</text>
</svg>
