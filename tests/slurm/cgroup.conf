# SLURM cgroup configuration for MPI integration testing
# All cgroup enforcement disabled for Docker container compatibility
#
# IgnoreSystemd=yes is required because Docker containers don't run systemd
# as PID 1, so the cgroup/v2 plugin cannot create scopes via dbus.
# With this flag, slurmd directly manipulates /sys/fs/cgroup instead.

CgroupPlugin=autodetect
IgnoreSystemd=yes
ConstrainCores=no
ConstrainDevices=no
ConstrainRAMSpace=no
ConstrainSwapSpace=no
