<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', sans-serif;">
  <style>
    text { fill: #c8c6c2; }
    .title { font-size: 14px; font-weight: 500; }
    .sub { font-size: 12px; fill: #8b9298; }
    .arr { stroke: #8b9298; stroke-width: 1; fill: none; }
    marker path { fill: none; stroke: #8b9298; stroke-width: 1.5; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect width="680" height="460" fill="#0f1419" rx="8"/>

  <text class="title" x="340" y="28" text-anchor="middle" fill="#e8e6e3">Two roles of seasonal stats</text>

  <!-- Role 1 -->
  <rect x="40" y="48" width="280" height="170" rx="16" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="title" x="180" y="72" text-anchor="middle" fill="#5dcaa5">Role 1 — Fitting</text>
  <text class="sub" x="180" y="92" text-anchor="middle" fill="#0f6e56">Always from history</text>
  <rect x="65" y="108" width="230" height="34" rx="6" fill="#085041" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="sub" x="180" y="129" text-anchor="middle" fill="#5dcaa5">μ_est, s_est → standardize</text>
  <rect x="65" y="152" width="230" height="34" rx="6" fill="#085041" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="sub" x="180" y="173" text-anchor="middle" fill="#5dcaa5">ρ(m, ℓ) → periodic YW</text>

  <!-- Role 2 -->
  <rect x="360" y="48" width="280" height="170" rx="16" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="500" y="72" text-anchor="middle" fill="#f0997b">Role 2 — LP construction</text>
  <text class="sub" x="500" y="92" text-anchor="middle" fill="#993c1d">User file or history</text>
  <rect x="385" y="108" width="230" height="34" rx="6" fill="#712b13" stroke="#993c1d" stroke-width="0.5"/>
  <text class="sub" x="500" y="129" text-anchor="middle" fill="#f0997b">μ_user, s_user → b_m, σ_m</text>
  <rect x="385" y="152" width="230" height="34" rx="6" fill="#712b13" stroke="#993c1d" stroke-width="0.5"/>
  <text class="sub" x="500" y="173" text-anchor="middle" fill="#f0997b">ψ = ψ* · s_m / s_{m-ℓ}</text>

  <!-- Bridge -->
  <rect x="230" y="256" width="220" height="40" rx="8" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="title" x="340" y="280" text-anchor="middle" fill="#afa9ec">ψ*, ratio (scale-invariant)</text>
  <line x1="180" y1="218" x2="280" y2="254" class="arr" marker-end="url(#a)" stroke="#534ab7"/>
  <line x1="400" y1="254" x2="500" y2="218" class="arr" marker-end="url(#a)" stroke="#534ab7"/>
  <text class="sub" x="195" y="242" fill="#afa9ec">output</text>
  <text class="sub" x="440" y="242" fill="#afa9ec">input</text>

  <!-- PrecomputedPar -->
  <rect x="120" y="336" width="440" height="100" rx="12" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="title" x="340" y="362" text-anchor="middle" fill="#e8e6e3">PrecomputedPar (LP arrays)</text>
  <rect x="140" y="378" width="126" height="38" rx="6" fill="#2d3440" stroke="#444441" stroke-width="0.5"/>
  <text class="sub" x="203" y="401" text-anchor="middle">b_m (base RHS)</text>
  <rect x="280" y="378" width="120" height="38" rx="6" fill="#2d3440" stroke="#444441" stroke-width="0.5"/>
  <text class="sub" x="340" y="401" text-anchor="middle">σ_m (noise)</text>
  <rect x="414" y="378" width="126" height="38" rx="6" fill="#2d3440" stroke="#444441" stroke-width="0.5"/>
  <text class="sub" x="477" y="401" text-anchor="middle">ψ_{m,ℓ} (lags)</text>
  <line x1="340" y1="296" x2="340" y2="334" class="arr" marker-end="url(#a)"/>
</svg>
