<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', sans-serif;">
  <style>
    text { fill: #c8c6c2; }
    .title { font-size: 14px; font-weight: 500; }
    .sub { font-size: 12px; fill: #8b9298; }
    .mono { font-size: 13px; font-family: 'JetBrains Mono', 'SF Mono', monospace; fill: #c8c6c2; }
    .arr { stroke: #8b9298; stroke-width: 1; fill: none; }
    marker path { fill: none; stroke: #8b9298; stroke-width: 1.5; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect width="680" height="380" fill="#0f1419" rx="8"/>
  <text class="title" x="340" y="28" text-anchor="middle" fill="#e8e6e3">One primitive, three applications</text>
  <text class="sub" x="340" y="46" text-anchor="middle">Random without replacement via seed-derived permutation</text>

  <!-- Formula -->
  <rect x="100" y="60" width="480" height="44" rx="8" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="mono" x="340" y="78" text-anchor="middle">seed = hash(sampling_seed, iteration, round)</text>
  <text class="mono" x="340" y="96" text-anchor="middle">index = fisher_yates(pool, seed)[m % pool]</text>

  <!-- Properties -->
  <rect x="55" y="124" width="130" height="28" rx="6" fill="#412402" stroke="#854f0b" stroke-width="0.5"/>
  <text class="sub" x="120" y="142" text-anchor="middle" fill="#f5a623">No repetitions</text>
  <rect x="200" y="124" width="120" height="28" rx="6" fill="#412402" stroke="#854f0b" stroke-width="0.5"/>
  <text class="sub" x="260" y="142" text-anchor="middle" fill="#f5a623">Deterministic</text>
  <rect x="335" y="124" width="120" height="28" rx="6" fill="#412402" stroke="#854f0b" stroke-width="0.5"/>
  <text class="sub" x="395" y="142" text-anchor="middle" fill="#f5a623">Zero comms</text>
  <rect x="470" y="124" width="140" height="28" rx="6" fill="#412402" stroke="#854f0b" stroke-width="0.5"/>
  <text class="sub" x="540" y="142" text-anchor="middle" fill="#f5a623">Addressable</text>

  <!-- Three applications -->
  <rect x="40" y="184" width="190" height="76" rx="8" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="title" x="135" y="210" text-anchor="middle" fill="#5dcaa5">LHS strata</text>
  <text class="sub" x="135" y="228" text-anchor="middle">Pool = N strata</text>
  <text class="sub" x="135" y="246" text-anchor="middle">Unique stratum per scenario</text>

  <rect x="250" y="184" width="190" height="76" rx="8" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="title" x="345" y="210" text-anchor="middle" fill="#afa9ec">Historical windows</text>
  <text class="sub" x="345" y="228" text-anchor="middle">Pool = W valid windows</text>
  <text class="sub" x="345" y="246" text-anchor="middle">Unique decade per scenario</text>

  <rect x="460" y="184" width="180" height="76" rx="8" fill="#4a1b0c" stroke="#993c1d" stroke-width="0.5"/>
  <text class="title" x="550" y="210" text-anchor="middle" fill="#f0997b">External scenarios</text>
  <text class="sub" x="550" y="228" text-anchor="middle">Pool = S file entries</text>
  <text class="sub" x="550" y="246" text-anchor="middle">Unique trajectory per scenario</text>

  <line x1="220" y1="104" x2="135" y2="182" class="arr" marker-end="url(#a)"/>
  <line x1="340" y1="104" x2="345" y2="182" class="arr" marker-end="url(#a)"/>
  <line x1="460" y1="104" x2="550" y2="182" class="arr" marker-end="url(#a)"/>

  <!-- Example -->
  <text class="title" x="340" y="296" text-anchor="middle" fill="#e8e6e3">Example: pool of 5 windows, shuffled by permutation</text>

  <rect x="100" y="310" width="60" height="24" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="130" y="326" text-anchor="middle">1940</text>
  <rect x="175" y="310" width="60" height="24" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="205" y="326" text-anchor="middle">1953</text>
  <rect x="250" y="310" width="60" height="24" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="280" y="326" text-anchor="middle">1971</text>
  <rect x="325" y="310" width="60" height="24" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="355" y="326" text-anchor="middle">1985</text>
  <rect x="400" y="310" width="60" height="24" rx="4" fill="#1a2028" stroke="#2d3440" stroke-width="0.5"/>
  <text class="sub" x="430" y="326" text-anchor="middle">2001</text>
  <text class="sub" x="490" y="326">← pool</text>

  <line x1="280" y1="334" x2="130" y2="344" stroke="#2d3440" stroke-width="0.5"/>
  <line x1="430" y1="334" x2="205" y2="344" stroke="#2d3440" stroke-width="0.5"/>
  <line x1="130" y1="334" x2="280" y2="344" stroke="#2d3440" stroke-width="0.5"/>
  <line x1="355" y1="334" x2="355" y2="344" stroke="#2d3440" stroke-width="0.5"/>
  <line x1="205" y1="334" x2="430" y2="344" stroke="#2d3440" stroke-width="0.5"/>

  <rect x="100" y="346" width="60" height="24" rx="4" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="sub" x="130" y="362" text-anchor="middle" fill="#afa9ec">1971</text>
  <rect x="175" y="346" width="60" height="24" rx="4" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="sub" x="205" y="362" text-anchor="middle" fill="#afa9ec">2001</text>
  <rect x="250" y="346" width="60" height="24" rx="4" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="sub" x="280" y="362" text-anchor="middle" fill="#afa9ec">1940</text>
  <rect x="325" y="346" width="60" height="24" rx="4" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="sub" x="355" y="362" text-anchor="middle" fill="#afa9ec">1985</text>
  <rect x="400" y="346" width="60" height="24" rx="4" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
  <text class="sub" x="430" y="362" text-anchor="middle" fill="#afa9ec">1953</text>
  <text class="sub" x="490" y="362">← scenario 0–4</text>
</svg>
