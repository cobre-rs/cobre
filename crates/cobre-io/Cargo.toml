[package]
name = "cobre-io"
description = "Case directory loading and validation for the Cobre power systems ecosystem"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
keywords = ["power-systems", "energy", "io", "validation"]
categories = ["science", "parser-implementations"]

[dependencies]
cobre-core = { path = "../cobre-core", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
