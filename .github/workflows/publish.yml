# Publish workspace crates to crates.io in dependency order.
#
# Triggered by version tags and manual dispatch. Requires a CARGO_REGISTRY_TOKEN
# secret in the "crates-io" GitHub environment.
#
# Each publish step tolerates "already exists" so the workflow is idempotent
# and can be safely re-run after partial failures.

name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order so each crate is available when the next
      # one is submitted. The 30-second sleeps give the index time to propagate
      # before the next crate tries to resolve the previous one as a dependency.

      - name: Publish all crates
        shell: bash
        run: |
          publish() {
            local crate="$1"
            echo "::group::Publishing $crate"
            local output
            if output=$(cargo publish -p "$crate" 2>&1); then
              echo "$output"
              echo "Published $crate successfully."
            elif echo "$output" | grep -q "already exists"; then
              echo "$output"
              echo "Crate $crate already published, skipping."
            else
              echo "$output"
              echo "::error::Failed to publish $crate"
              echo "::endgroup::"
              return 1
            fi
            echo "::endgroup::"
          }

          # Layer 1: no intra-workspace dependencies
          publish cobre-core || exit 1
          sleep 30

          # Layer 2a: depends on cobre-core only
          publish cobre-stochastic || exit 1
          publish cobre-solver || exit 1
          publish cobre-comm || exit 1
          publish cobre-tui || exit 1
          sleep 30

          # Layer 2b: depends on cobre-core + cobre-stochastic
          publish cobre-io || exit 1
          sleep 30

          # Layer 3: depends on infrastructure crates
          publish cobre-sddp || exit 1
          sleep 30

          # Layer 4: application crates (depend on cobre-sddp)
          publish cobre-cli || exit 1
          publish cobre-mcp || exit 1
          sleep 30

          # Layer 5: umbrella crate (depends on all of the above)
          # cobre-python is published to PyPI via maturin, not crates.io.
          publish cobre || exit 1

          echo "All crates published successfully."
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # GitHub Release creation and binary artifact distribution are handled
  # by cargo-dist in .github/workflows/release.yml.
