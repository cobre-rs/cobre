# SLURM Configuration for 2-node MPI integration testing
# 2-node cluster: controller (slurmctld + slurmd) and node2 (slurmd only)

# Cluster identification
ClusterName=mpi-test
SlurmctldHost=controller

# Authentication
AuthType=auth/munge
CryptoType=crypto/munge

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

# State save location
StateSaveLocation=/var/spool/slurm/ctld
SlurmdSpoolDir=/var/spool/slurm/d

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Process tracking (linuxproc avoids cgroup dependency in containers)
ProctrackType=proctrack/linuxproc

# Disable cgroup and job container plugins for container environment
TaskPlugin=task/none
JobContainerType=job_container/none

# MPI launch is managed by mpiexec inside job scripts, not by SLURM's srun PMI
MpiDefault=none

# Return to service automatically (e.g. after slurmd restart)
ReturnToService=2

# Timeouts
SlurmctldTimeout=120
SlurmdTimeout=120
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# Compute node definitions (hostnames must match container hostnames)
NodeName=controller CPUs=4 RealMemory=4096 State=UNKNOWN
NodeName=node2      CPUs=4 RealMemory=4096 State=UNKNOWN

# Partition definition (both nodes, oversubscription enabled for Docker testing)
PartitionName=test Nodes=controller,node2 Default=YES MaxTime=INFINITE State=UP OverSubscribe=YES
